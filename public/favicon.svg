cat > /Users/gauravsengar/news-site/.github/workflows/build-and-deploy.yml << 'YAMLEOF'
name: Build and Deploy to GitHub Pages

on:
  schedule:
    - cron: '*/30 6-22 * * *'
    - cron: '0 0-5,23 * * *'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: Fetch latest market news
        run: node scripts/fetch-news.js
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          GNEWS_KEY: ${{ secrets.GNEWS_KEY }}
      - name: Generate RSS & Sitemap
        run: node scripts/generate-sitemap.js
      - name: Build Astro site
        run: npx astro build
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://gauravsengar24.github.io/global-news-hub' }}
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
YAMLEOF
echo "workflow written"